# =============================================================
# 이벤트 로그 파이프라인 — Docker Compose 구성
#
# 실행: docker compose up --build
#
# 구성:
#   db  - PostgreSQL 17 (이벤트 저장소)
#   app - Python 3.12 (이벤트 생성 → 적재 → 분석 → 시각화)
#
# 동작 흐름:
#   1. DB 컨테이너 실행 + init.sql로 테이블 자동 생성
#   2. healthcheck로 DB 준비 상태 확인
#   3. DB가 healthy 상태가 되면 App 컨테이너 실행
#   4. App이 파이프라인 전 과정 수행 후 종료
#   5. 결과 차트(dashboard.png)가 호스트의 ./output/ 폴더에 저장됨
# =============================================================

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_pass
      POSTGRES_DB: events_db
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline_user -d events_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"

  app:
    build: ./app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://pipeline_user:pipeline_pass@db:5432/events_db
      EVENT_COUNT: "2000"
    volumes:
      - ./output:/app/output
